name: release
permissions: read-all

on:
  push:
    tags:
      - 'v*'

jobs:
  # Gate the release on a green build before any artifact ships. The PR-CI workflow
  # covers richer matrix testing on PRs; here we re-run the basics against the tag
  # commit so a packaging or build regression cannot ship as a tagged release.
  validate:
    name: Validate (test + build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify plugin.yaml version matches tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          plugin_version=$(awk -F'"' '/^version:/ {print $2; exit}' plugin.yaml)
          if [[ "${tag}" != "${plugin_version}" ]]; then
            echo "Tag (v${tag}) does not match plugin.yaml version (${plugin_version})." >&2
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: |
          mkdir -p bin
          go build -trimpath -ldflags='-s -w' -o bin/helm-kubescape ./cmd/helm-kubescape

      - name: Plugin smoke (help + version)
        run: |
          set -euo pipefail
          ./bin/helm-kubescape help >/dev/null
          ./bin/helm-kubescape version >/dev/null || true   # version probes kubescape; tolerate missing CLI

  release:
    name: Create GitHub release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build source tarball
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          archive="helm-kubescape-${tag}.tar.gz"
          tar --exclude='.git' --exclude='.github' --exclude='dist' \
              -czf "${archive}" \
              plugin.yaml install-binary.sh install-binary.ps1 Makefile \
              go.mod go.sum cmd internal \
              README.md LICENSE
          sha256sum "${archive}" | tee "${archive}.sha256"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            helm-kubescape-*.tar.gz
            helm-kubescape-*.tar.gz.sha256
