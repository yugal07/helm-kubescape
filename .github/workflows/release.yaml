name: release
permissions: read-all

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin.yaml version matches tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          plugin_version=$(awk -F'"' '/^version:/ {print $2; exit}' plugin.yaml)
          if [[ "${tag}" != "${plugin_version}" ]]; then
            echo "Tag (v${tag}) does not match plugin.yaml version (${plugin_version})." >&2
            exit 1
          fi

      - name: Build source tarball
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          archive="helm-kubescape-${tag}.tar.gz"
          tar --exclude='.git' --exclude='.github' --exclude='dist' \
              -czf "${archive}" \
              plugin.yaml install-binary.sh Makefile \
              go.mod go.sum cmd internal \
              README.md LICENSE
          sha256sum "${archive}" | tee "${archive}.sha256"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            helm-kubescape-*.tar.gz
            helm-kubescape-*.tar.gz.sha256
